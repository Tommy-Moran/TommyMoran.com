services:
  - type: web
    name: tommymoran-com-chatbot
    env: python
    buildCommand: apt-get update -y && apt-get install -y poppler-utils && pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_config.py server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false 